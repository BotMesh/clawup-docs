name: CI

on:
  pull_request:
  push:
    branches: ["main", "master"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust compile check
        working-directory: backend
        run: cargo check --all-targets

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: runtime-provisioner/go.mod

      - name: Go fmt check
        working-directory: runtime-provisioner
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "These files are not gofmt-formatted:" >&2
            echo "$UNFORMATTED" >&2
            exit 1
          fi

      - name: Go vet
        working-directory: runtime-provisioner
        run: go vet ./...

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend typecheck + build
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit
          npm run build

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust tests
        working-directory: backend
        run: cargo test --all --all-targets

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: runtime-provisioner/go.mod

      - name: Go tests
        working-directory: runtime-provisioner
        run: go test ./...
